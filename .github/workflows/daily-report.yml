name: Daily Market Report

on:
  schedule:
    # 08:00 KST (UTC+9) = 23:00 UTC 전날 → 일~목(UTC) = 월~금(KST)
    - cron: '0 23 * * 0-4'
  workflow_dispatch:   # 수동 실행 버튼

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # GitHub Pages 배포용

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate & send daily report
        run: node tools/main.js --now
        env:
          GOOGLE_API_KEY:       ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MODEL:         gemini-2.5-flash
          BOK_API_KEY:          ${{ secrets.BOK_API_KEY }}
          NAVER_CLIENT_ID:      ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:  ${{ secrets.NAVER_CLIENT_SECRET }}
          NOTION_API_KEY:       ${{ secrets.NOTION_API_KEY }}
          NOTION_PAGE_ID:       ${{ secrets.NOTION_PAGE_ID }}
          NOTION_ARCHIVE_DB_ID: ${{ secrets.NOTION_ARCHIVE_DB_ID }}
          GMAIL_SENDER:         ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_RECIPIENT:      ${{ secrets.GMAIL_RECIPIENT }}
          GITHUB_PAGES_BASE:    ${{ secrets.GITHUB_PAGES_BASE }}
          TZ:                   Asia/Seoul
          OUTPUT_DIR:           ./outputs

      - name: Deploy report HTML to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./outputs
          destination_dir: outputs
          keep_files:   true
          commit_message: "report: add ${{ github.run_id }}"

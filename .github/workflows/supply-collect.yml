name: Supply Snapshot (16:40 KST)

on:
  schedule:
    # 16:40 KST = 07:40 UTC (월~금, 장 마감 10분 후)
    - cron: '40 7 * * 1-5'
  workflow_dispatch:

jobs:
  supply:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Collect supply & VKOSPI snapshot
        run: node tools/collectors/supply_snapshot.js
        env:
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          TZ:                  Asia/Seoul
          OUTPUT_DIR:          ./outputs

      - name: Commit supply.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/*/supply.json || true
          git diff --cached --quiet || git commit -m "data: supply snapshot $(date +'%Y-%m-%d')"
          git push || true
